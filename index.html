<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Место</title>
  <link rel="stylesheet" href="./src/styles/index.css">
  <script type="module" crossorigin src="./assets/index-D13ncNlK.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DNbS4tJ4.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <img class="header__logo" src="./assets/logo-C_QQpFK1.svg" alt="Логотип Место">
    </header>

    <main class="content">
      <!-- Профиль -->
      <section class="profile">
        <div class="profile__avatar-container">
          <img class="profile__avatar" src="./assets/avatar-jDl9RI_U.jpg" alt="Аватар пользователя">
          <button class="profile__avatar-edit-button" type="button" aria-label="Обновить аватар"></button>
        </div>
        <div class="profile__info">
          <h1 class="profile__name">Жак-Ив Кусто</h1>
          <p class="profile__description">Исследователь океана</p>
          <button class="profile__edit-button" type="button" aria-label="Редактировать профиль"></button>
        </div>
        <button class="profile__add-button" type="button" aria-label="Добавить карточку"></button>
      </section>

      <!-- Сетка карточек -->
      <section class="cards">
        <ul class="cards__list"></ul>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__copyright">&copy; 2024 Mesto</p>
    </footer>

    <!-- Модальное окно редактирования профиля -->
    <div class="popup" id="popup-edit-profile">
      <div class="popup__container">
        <button class="popup__close-button" type="button" aria-label="Закрыть модальное окно"></button>
        <h2 class="popup__title">Редактировать профиль</h2>
        <form class="popup__form" name="edit-profile" novalidate>
          <label class="popup__field">
            <input class="popup__input" type="text" name="name" placeholder="Имя" required minlength="2" maxlength="40"
              pattern="^[A-Za-zА-Яа-яЁё\- ]+$">
            <span class="popup__error" id="name-error"></span>
          </label>
          <label class="popup__field">
            <input class="popup__input" type="text" name="description" placeholder="О себе" required minlength="2"
              maxlength="200" pattern="^[A-Za-zА-Яа-яЁё\- ]+$">
            <span class="popup__error" id="description-error"></span>
          </label>
          <button class="popup__button popup__button_disabled" type="submit" disabled>Сохранить</button>
        </form>
      </div>
    </div>

    <!-- Модальное окно добавления карточки -->
    <div class="popup" id="popup-add-card">
      <div class="popup__container">
        <button class="popup__close-button" type="button" aria-label="Закрыть модальное окно"></button>
        <h2 class="popup__title">Новое место</h2>
        <form class="popup__form" name="add-card" novalidate>
          <label class="popup__field">
            <input class="popup__input" type="text" name="name" placeholder="Название" required minlength="1"
              maxlength="30" pattern="^[A-Za-zА-Яа-яЁё\- ]+$">
            <span class="popup__error" id="card-name-error"></span>
          </label>
          <label class="popup__field">
            <input class="popup__input" type="url" name="link" placeholder="Ссылка на картинку" required>
            <span class="popup__error" id="card-link-error"></span>
          </label>
          <button class="popup__button popup__button_disabled" type="submit" disabled>Создать</button>
        </form>
      </div>
    </div>

    <!-- Модальное окно с картинкой -->
    <div class="popup" id="popup-image">
      <div class="popup__container popup__container_type_image">
        <button class="popup__close-button" type="button" aria-label="Закрыть модальное окно"></button>
        <figure class="popup__figure">
          <img class="popup__image" src="" alt="">
          <figcaption class="popup__caption"></figcaption>
        </figure>
      </div>
    </div>

    <!-- Модальное окно обновления аватара -->
    <div class="popup" id="popup-avatar">
      <div class="popup__container">
        <button class="popup__close-button" type="button" aria-label="Закрыть модальное окно"></button>
        <h2 class="popup__title">Обновить аватар</h2>
        <form class="popup__form" name="avatar" novalidate>
          <label class="popup__field">
            <input class="popup__input" type="url" name="avatar" placeholder="Ссылка на аватар" required>
            <span class="popup__error" id="avatar-error"></span>
          </label>
          <button class="popup__button popup__button_disabled" type="submit" disabled>Сохранить</button>
        </form>
      </div>
    </div>

    <!-- Модальное окно информации о карточке -->
    <div class="popup popup_type_info" id="popup-info">
      <div class="popup__container">
        <button class="popup__close-button" type="button" aria-label="Закрыть модальное окно"></button>
        <h2 class="popup__title popup__title_type_info">Информация о карточке</h2>
        <div class="popup__info-container">
          <div class="popup__info-column">
            <h3 class="popup__info-subtitle">Общая информация</h3>
            <ul class="popup__info-list popup__info-list_type_common">
              <!-- Сюда будут добавляться строки информации -->
            </ul>
          </div>
          <div class="popup__info-column">
            <h3 class="popup__info-subtitle">Лайкнули</h3>
            <ul class="popup__info-list popup__info-list_type_likes">
              <!-- Сюда будут добавляться пользователи -->
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Шаблон карточки -->
    <template id="card-template">
      <li class="card">
        <button class="card__control-button card__control-button_type_info" type="button" aria-label="Информация о карточке">i</button>
        <img class="card__image" src="" alt="">
        <button class="card__delete-button" type="button" aria-label="Удалить карточку"></button>
        <div class="card__info">
          <h2 class="card__title"></h2>
          <div class="card__like-container">
            <button class="card__like-button" type="button" aria-label="Поставить лайк"></button>
            <span class="card__like-counter">0</span>
          </div>
        </div>
      </li>
    </template>

    <!-- Шаблон строки информации -->
    <template id="popup-info-definition-template">
      <li class="popup__info-item">
        <span class="popup__info-term"></span>
        <span class="popup__info-definition"></span>
      </li>
    </template>

    <!-- Шаблон пользователя в списке лайков -->
    <template id="popup-info-user-preview-template">
      <li class="popup__info-user">
        <img class="popup__info-user-avatar" src="" alt="">
        <span class="popup__info-user-name"></span>
      </li>
    </template>
  </div>

</body>
</html>
